services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # Celery worker: runs the actual bot sessions. Needs PulseAudio + Xvfb, so it
  # uses the bot image (entrypoint boots PulseAudio, then runs the worker).
  worker:
    build: .
    command: celery -A tasks worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis
    volumes:
      - ./bot-profile:/app/bot-profile     # authenticated Google profile (see DEPLOY.md)
      - ./recordings:/app/recordings
    shm_size: "1gb"
    restart: unless-stopped

  # HTTP API: POST /join {"url": "..."} enqueues a bot session.
  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis
    ports:
      - "8001:8000"
    restart: unless-stopped
